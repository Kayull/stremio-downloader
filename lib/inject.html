<div id="download-toast" class="download-toast" role="status" aria-live="polite" aria-atomic="true">
	<div class="download-toast-logo">
		<img src="/assets/addonLogo.png" width="40" height="40" alt="">
	</div>
	<div class="download-toast-copy">
		<strong class="download-toast-title">Download Started</strong>
		<div id="download-toast-desc" class="download-toast-desc"></div>
	</div>
</div>
<script>
	let toastTimer

	function launch_toast(msg) {
		const toast = document.getElementById('download-toast')
		const desc = document.getElementById('download-toast-desc')

		desc.textContent = msg || 'Added to the download queue.'
		clearTimeout(toastTimer)

		toast.classList.remove('is-visible')
		void toast.offsetWidth
		toast.classList.add('is-visible')

		toastTimer = setTimeout(() => {
			toast.classList.remove('is-visible')
		}, 6500)
	}

	(function () {
		async function openDownloaderFromToast() {
			const baseUrl = window.location.href.split('/web/')[0]
			const params = new URL(window.location.href).searchParams
			const useDesktopShell = params.get('desktop-shell') === '1'

			if (useDesktopShell) {
				window.location.assign('stremio-downloader://open/downloader')
				return
			}

			window.open(baseUrl + '/downloader/', 'stremio-downloader')
		}

		$('#download-toast').click(() => {
			openDownloaderFromToast()
		})

		const css = '' +
			'.download-toast{' +
				'position:fixed;' +
				'right:24px;' +
				'bottom:24px;' +
				'z-index:2147483647;' +
				'display:grid;' +
				'grid-template-columns:auto minmax(0,1fr);' +
				'gap:14px;' +
				'align-items:center;' +
				'width:min(520px,calc(100vw - 32px));' +
				'padding:14px 16px;' +
				'border:1px solid rgba(89,122,185,0.18);' +
				'border-radius:20px;' +
				'background:linear-gradient(180deg,rgba(248,251,255,0.98),rgba(238,244,255,0.96));' +
				'box-shadow:0 22px 60px rgba(7,17,31,0.26);' +
				'backdrop-filter:blur(14px);' +
				'-webkit-backdrop-filter:blur(14px);' +
				'cursor:pointer;' +
				'opacity:0;' +
				'transform:translateY(18px) scale(0.985);' +
				'pointer-events:none;' +
				'transition:opacity 220ms ease,transform 220ms ease;' +
			'}' +
			'.download-toast.is-visible{' +
				'opacity:1;' +
				'transform:translateY(0) scale(1);' +
				'pointer-events:auto;' +
			'}' +
			'.download-toast-logo{' +
				'display:grid;' +
				'place-items:center;' +
				'width:52px;' +
				'height:52px;' +
				'border-radius:16px;' +
				'background:linear-gradient(135deg,rgba(47,116,255,0.14),rgba(84,166,255,0.2));' +
				'box-shadow:inset 0 1px 0 rgba(255,255,255,0.7);' +
				'flex:0 0 auto;' +
			'}' +
			'.download-toast-logo img{' +
				'display:block;' +
				'width:40px;' +
				'height:40px;' +
				'object-fit:contain;' +
			'}' +
			'.download-toast-copy{' +
				'min-width:0;' +
				'display:grid;' +
				'gap:4px;' +
			'}' +
			'.download-toast-title{' +
				'display:block;' +
				'color:#162949;' +
				'font-size:14px;' +
				'font-weight:800;' +
				'letter-spacing:0.01em;' +
			'}' +
			'.download-toast-desc{' +
				'color:#556b8c;' +
				'font-size:13px;' +
				'line-height:1.45;' +
				'overflow:hidden;' +
				'text-overflow:ellipsis;' +
				'white-space:nowrap;' +
			'}' +
			'@media (max-width: 640px){' +
				'.download-toast{' +
					'right:12px;' +
					'left:12px;' +
					'bottom:12px;' +
					'width:auto;' +
					'padding:13px 14px;' +
				'}' +
				'.download-toast-desc{' +
					'white-space:normal;' +
					'display:-webkit-box;' +
					'-webkit-line-clamp:2;' +
					'-webkit-box-orient:vertical;' +
				'}' +
			'}'

		const head = document.head || document.getElementsByTagName('head')[0]
		const style = document.createElement('style')
		head.appendChild(style)
		style.type = 'text/css'
		if (style.styleSheet)
			style.styleSheet.cssText = css
		else
			style.appendChild(document.createTextNode(css))

		const log = console.info
		console.info = async function () {
			const text = arguments[0]
			if (text.includes('Player starting URL:')) {
				let videoUrl = text.split('Player starting URL: ')[1].split(' ')[0]
				const title = $('#windowTitle').text().trim()
				if (videoUrl.startsWith('http://127.0.0.1:') && videoUrl.endsWith('/hls.m3u8'))
					videoUrl = videoUrl.replace('/hls.m3u8', '/')
				let url = window.location.href
				const streamId = url.split('/')[10]
				const metaUrl = window.lastMetaUrl || ''
				let metaId = ''
				let metaType = ''
				if (metaUrl && metaUrl.includes('/')) {
					let parts = metaUrl.split('/')
					metaId = parts.pop()
					metaId = metaId.replace('.json', '')
					metaType = parts.pop()
				}
				url = url.split('/web/')[0] + '/api?method=add-download&url=' + encodeURIComponent(videoUrl) + '&title=' + encodeURIComponent(title) + '&streamId=' + encodeURIComponent(streamId) + '&metaUrl=' + encodeURIComponent(metaUrl) + '&metaId=' + encodeURIComponent(metaId) + '&metaType=' + encodeURIComponent(metaType)
				window.history.back()
				const response = await fetch(url)
				const downUrl = await response.text()
				launch_toast(downUrl ? downUrl : 'Added to the download queue.')
			}
			log.apply(this, Array.prototype.slice.call(arguments))
		}
	}())
</script>
