<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stremio Downloader</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, sans-serif;
        background: #07111f;
        color: #f4f8ff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(255, 146, 76, 0.24), transparent 34%),
          radial-gradient(circle at top right, rgba(54, 124, 255, 0.26), transparent 32%),
          linear-gradient(180deg, #07111f, #0f1f36);
      }

      main {
        max-width: 28rem;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(255, 255, 255, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(244, 248, 255, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Starting Stremio Downloader</h1>
      <p>The desktop shell is waiting for the local downloader service.</p>
    </main>
  </body>
</html>
