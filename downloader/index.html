<html>

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Stremio Downloader</title>
		<link rel="stylesheet" type="text/css" href="dialog/polyfill.css" />
		<script src="/vendor/jquery/jquery.min.js"></script>
		<link rel="stylesheet" type="text/css" href="styles.css">
	</head>

	<body>
		<div id="pageContent">
			<div class="app-shell">
				<header class="hero-panel">
					<div class="hero-brand">
						<img src="logo.png" alt="Stremio Downloader logo">
					</div>
				</header>

				<section class="toolbar">
					<label class="search-card" for="query">
						<span class="input-label">Search Downloads</span>
						<input id="query" name="query" type="text" placeholder="Filter by title, season, codec, source or extension">
					</label>

					<div class="toolbar-actions">
						<button type="button" class="app-button app-button-secondary" onClick="showLogs()">
							Logs
						</button>
						<button type="button" class="app-button app-button-secondary" onClick="options()">
							Options
						</button>
						<button type="button" class="app-button app-button-primary load-stremio" onClick="apiCall('load-stremio')">
							Load Stremio
						</button>
					</div>
				</section>

				<section class="notice-stack">
					<div id="no-engine" class="notice-card notice-warning">
						<div class="notice-title">Torrent engine unavailable</div>
						<div class="notice-copy">Start the Stremio desktop app to download torrents. Direct web streams and debrid streams should still work normally.</div>
					</div>
				</section>

				<section class="downloads-panel">
					<div class="panel-header">
						<div>
							<h2>Downloads</h2>
						</div>
						<div id="result-count" class="result-count">0 items</div>
					</div>

					<div id="downloads" class="downloads-list"></div>
				</section>
			</div>
		</div>
		<dialog id="dialog" class="mdl-dialog"></dialog>
		<script src="dialog/polyfill.js"></script>
		<script src="script.js"></script>
	</body>

</html>
