name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n' < VERSION)"
          TAG="${GITHUB_REF_NAME}"
          if [ "${TAG}" != "v${VERSION}" ]; then
            echo "Tag ${TAG} does not match VERSION v${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" \
              --title "Stremio Downloader ${GITHUB_REF_NAME}" \
              --generate-notes

  build-and-upload:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: universal-apple-darwin
            platform_label: macos-universal
            archive_name: stremio-downloader-${{ github.ref_name }}-macos-universal.zip
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            platform_label: windows-x64
            archive_name: stremio-downloader-${{ github.ref_name }}-windows-x64.zip
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            platform_label: linux-x64
            archive_name: stremio-downloader-${{ github.ref_name }}-linux-x64.zip
    runs-on: ${{ matrix.runner }}
    env:
      TAURI_TARGET_TRIPLE: ${{ matrix.target }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'universal-apple-darwin' && 'aarch64-apple-darwin,x86_64-apple-darwin' || matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            zip

      - name: Install npm dependencies
        shell: bash
        run: npm ci

      - name: Resolve Node version
        id: node-version
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(node -p "process.version.slice(1)")" >> "$GITHUB_OUTPUT"

      - name: Download universal macOS Node runtimes
        if: runner.os == 'macOS'
        shell: bash
        env:
          NODE_VERSION: ${{ steps.node-version.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p .ci/node
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-arm64.tar.gz" -o ".ci/node/node-v${NODE_VERSION}-darwin-arm64.tar.gz"
          curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" -o ".ci/node/node-v${NODE_VERSION}-darwin-x64.tar.gz"
          tar -xzf ".ci/node/node-v${NODE_VERSION}-darwin-arm64.tar.gz" -C .ci/node
          tar -xzf ".ci/node/node-v${NODE_VERSION}-darwin-x64.tar.gz" -C .ci/node
          echo "DESKTOP_NODE_BIN_AARCH64_APPLE_DARWIN=${GITHUB_WORKSPACE}/.ci/node/node-v${NODE_VERSION}-darwin-arm64/bin/node" >> "$GITHUB_ENV"
          echo "DESKTOP_NODE_BIN_X86_64_APPLE_DARWIN=${GITHUB_WORKSPACE}/.ci/node/node-v${NODE_VERSION}-darwin-x64/bin/node" >> "$GITHUB_ENV"

      - name: Build release bundle
        shell: bash
        run: npm run tauri:build -- --target "${{ matrix.target }}"

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n' < VERSION)"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create macOS release zip
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="tauri/release/${{ steps.version.outputs.value }}-${{ matrix.platform_label }}"
          ditto -c -k --sequesterRsrc --keepParent \
            "${RELEASE_DIR}/Stremio Downloader.app" \
            "tauri/release/${{ matrix.archive_name }}"

      - name: Create Linux release zip
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="tauri/release/${{ steps.version.outputs.value }}-${{ matrix.platform_label }}"
          (
            cd "${RELEASE_DIR}"
            zip -r "../${{ matrix.archive_name }}" .
          )

      - name: Create Windows release zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = "tauri/release/${{ steps.version.outputs.value }}-${{ matrix.platform_label }}"
          $archivePath = "tauri/release/${{ matrix.archive_name }}"
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $archivePath

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" "tauri/release/${{ matrix.archive_name }}" --clobber
