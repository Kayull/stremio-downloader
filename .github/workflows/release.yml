name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    tags:
      - 'v*.*.*'
    paths:
      - 'VERSION'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        shell: bash
        env:
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n' < VERSION)"
          SHOULD_RELEASE="false"
          TAG="v${VERSION}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SHOULD_RELEASE="true"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
            if [ "${TAG}" != "v${VERSION}" ]; then
              echo "Tag ${TAG} does not match VERSION v${VERSION}" >&2
              exit 1
            fi
            SHOULD_RELEASE="true"
          else
            PREVIOUS_VERSION=""
            if [ -n "${BEFORE_SHA}" ] && [ "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
              PREVIOUS_VERSION="$(git show "${BEFORE_SHA}:VERSION" 2>/dev/null | tr -d '\r\n' || true)"
            fi

            if [ -z "${PREVIOUS_VERSION}" ]; then
              SHOULD_RELEASE="true"
              echo "No previous VERSION found; treating this push as a release trigger."
            elif [ "${PREVIOUS_VERSION}" = "${VERSION}" ]; then
              echo "VERSION did not change; skipping release."
            elif [ "$(printf '%s\n%s\n' "${PREVIOUS_VERSION}" "${VERSION}" | sort -V | tail -n 1)" = "${VERSION}" ]; then
              SHOULD_RELEASE="true"
              echo "VERSION increased from ${PREVIOUS_VERSION} to ${VERSION}; creating release."
            else
              echo "VERSION changed from ${PREVIOUS_VERSION} to ${VERSION}, but it did not increase; skipping release."
            fi
          fi

          echo "should_release=${SHOULD_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        if: steps.version.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "${{ steps.version.outputs.release_tag }}" >/dev/null 2>&1 || \
            gh release create "${{ steps.version.outputs.release_tag }}" \
              --target "${GITHUB_SHA}" \
              --title "Stremio Downloader ${{ steps.version.outputs.release_tag }}" \
              --generate-notes

  build-and-upload:
    needs: create-release
    if: needs.create-release.outputs.should_release == 'true'
    name: Build ${{ matrix.archive_suffix }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            tauri_target: universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            platform_label: macos-universal
            archive_suffix: macos-universal
            artifact_ext: dmg
          - runner: windows-latest
            tauri_target: x86_64-pc-windows-msvc
            rust_targets: x86_64-pc-windows-msvc
            platform_label: windows-x64
            archive_suffix: windows-x64
            artifact_ext: zip
          - runner: ubuntu-22.04
            platform_label: linux-x64
            archive_suffix: linux-x64
            artifact_ext: zip
    runs-on: ${{ matrix.runner }}
    env:
      DESKTOP_STRIP_BINARIES: '1'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install Rust stable
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.tauri_target || 'native' }}
          workspaces: |
            tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            zip

      - name: Install npm dependencies
        shell: bash
        run: npm ci

      - name: Resolve Node version
        id: node-version
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          echo "value=$(node -p "process.version.slice(1)")" >> "$GITHUB_OUTPUT"

      - name: Cache universal macOS Node runtimes
        if: runner.os == 'macOS'
        uses: actions/cache@v4
        with:
          path: .ci/node
          key: ${{ runner.os }}-node-runtime-${{ steps.node-version.outputs.value }}

      - name: Download universal macOS Node runtimes
        if: runner.os == 'macOS'
        shell: bash
        env:
          NODE_VERSION: ${{ steps.node-version.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p .ci/node
          if [ ! -x ".ci/node/node-v${NODE_VERSION}-darwin-arm64/bin/node" ]; then
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-arm64.tar.gz" -o ".ci/node/node-v${NODE_VERSION}-darwin-arm64.tar.gz"
            tar -xzf ".ci/node/node-v${NODE_VERSION}-darwin-arm64.tar.gz" -C .ci/node
          fi
          if [ ! -x ".ci/node/node-v${NODE_VERSION}-darwin-x64/bin/node" ]; then
            curl -fsSL "https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-darwin-x64.tar.gz" -o ".ci/node/node-v${NODE_VERSION}-darwin-x64.tar.gz"
            tar -xzf ".ci/node/node-v${NODE_VERSION}-darwin-x64.tar.gz" -C .ci/node
          fi
          echo "DESKTOP_NODE_BIN_AARCH64_APPLE_DARWIN=${GITHUB_WORKSPACE}/.ci/node/node-v${NODE_VERSION}-darwin-arm64/bin/node" >> "$GITHUB_ENV"
          echo "DESKTOP_NODE_BIN_X86_64_APPLE_DARWIN=${GITHUB_WORKSPACE}/.ci/node/node-v${NODE_VERSION}-darwin-x64/bin/node" >> "$GITHUB_ENV"

      - name: Build release bundle
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.tauri_target }}" ]; then
            npm run build -- --target "${{ matrix.tauri_target }}"
          else
            npm run build
          fi

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(tr -d '\r\n' < VERSION)"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set archive name
        id: archive
        shell: bash
        run: |
          set -euo pipefail
          echo "value=stremio-downloader-${{ needs.create-release.outputs.release_tag }}-${{ matrix.archive_suffix }}.${{ matrix.artifact_ext }}" >> "$GITHUB_OUTPUT"

      - name: Prepare macOS release DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="tauri/release/${{ steps.version.outputs.value }}-${{ matrix.platform_label }}"
          DMG_SOURCE="$(find "${RELEASE_DIR}" -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
          if [ -z "${DMG_SOURCE}" ]; then
            echo "No DMG artifact found in ${RELEASE_DIR}" >&2
            exit 1
          fi
          mv "${DMG_SOURCE}" "tauri/release/${{ steps.archive.outputs.value }}"

      - name: Create Linux release zip
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_DIR="tauri/release/${{ steps.version.outputs.value }}-${{ matrix.platform_label }}"
          (
            cd "${RELEASE_DIR}"
            zip -r "../${{ steps.archive.outputs.value }}" .
          )

      - name: Create Windows release zip
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseDir = "tauri/release/${{ steps.version.outputs.value }}-${{ matrix.platform_label }}"
          $archivePath = "tauri/release/${{ steps.archive.outputs.value }}"
          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }
          Compress-Archive -Path "$releaseDir\*" -DestinationPath $archivePath

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release upload "${{ needs.create-release.outputs.release_tag }}" "tauri/release/${{ steps.archive.outputs.value }}" --clobber
